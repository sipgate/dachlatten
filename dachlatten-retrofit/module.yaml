product:
    type: lib
    platforms: [android, jvm]

dependencies:
    - $libs.androidx.annotation
    - $libs.retrofit.serialization
    - $libs.okhttp

test-dependencies:
    - $libs.okhttp.mockwebserver

settings:
    kotlin:
        serialization: json
    publishing:
        group: de.sipgate
        name: dachlatten-retrofit

test-settings:
    junit: junit-5

apply:
    - ../common/kotlin.yaml
    - ../common/coroutines.yaml
    - ../common/kover.yaml
    - ../common/publishing.yaml
