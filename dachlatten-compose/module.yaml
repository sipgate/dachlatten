product:
    type: lib
    platforms: [android]

dependencies:
    - ../dachlatten-primitives
    - $libs.androidx.lifecycle.process: exported
    - $compose.foundation
    - $compose.ui
    - $compose.animation

test-dependencies:
    - $libs.androidx.compose.ui.test.junit4
    - $libs.androidx.compose.ui.test.manifest

settings:
    compose: enabled
    kotlin:
        languageFeatures:
            - contextReceivers
    publishing:
        group: de.sipgate
        name: dachlatten-compose

apply:
    - ../common/kotlin.yaml
    - ../common/kover.yaml
    - ../common/robolectric.yaml
    - ../common/publishing.yaml
